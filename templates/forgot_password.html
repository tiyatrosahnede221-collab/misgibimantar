<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Şifremi Unuttum</title>
    <style>
        body { background:#142850; color:#fff; font-family:Arial; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;}
        .box { background:#27496d; padding:26px; border-radius:10px; width:420px; }
        input, button { width:100%; margin:8px 0; padding:10px; border-radius:6px; border:none; }
        button { background:#00a8cc; color:#fff; cursor:pointer; }
        .info { color:#8f8; margin-top:10px; }
        .error { color:#f66; margin-top:10px; }
        .code-area { margin-top:18px; border-top:1px solid rgba(255,255,255,0.06); padding-top:14px; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Şifre Sıfırlama</h3>

        <!-- Request reset: username -->
        <form method="post" action="{{ url_for('forgot') }}" autocomplete="off">
            <input type="text" name="username" placeholder="Kullanıcı adınız" required>
            <button type="submit">Kodu Gönder</button>
        </form>

        {% if info %}
            <div class="{{ 'info' if show_code or (info and 'gönder' in info) else 'error' }}">{{ info }}</div>
        {% endif %}

        {% if show_code %}
            <div style="margin-top:10px; color:#fff;">
                <strong>Geliştirme modu - Kod:</strong> <span style="color:#00a8cc; font-weight:bold;">{{ show_code }}</span>
            </div>
        {% endif %}

        <!-- Verify code form -->
        <div class="code-area">
            <h4>Kod ile doğrula</h4>
            <form method="post" action="{{ url_for('verify_code') }}" autocomplete="off">
                <input type="text" name="username" placeholder="Kullanıcı adınız" required>
                <input type="text" name="code" placeholder="Gönderilen kod" required>
                <button type="submit">Kodu Doğrula</button>
            </form>
        </div>

        <p style="margin-top:12px;"><a href="{{ url_for('login') }}" style="color:#00a8cc;">Giriş sayfasına dön</a></p>
    </div>
</body>
</html>
