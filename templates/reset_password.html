<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Şifreyi Sıfırla</title>
    <style>
        body { background:#142850; color:#fff; font-family:Arial; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;}
        .box { background:#27496d; padding:30px; border-radius:10px; width:420px; }
        input, button { width:100%; margin:8px 0; padding:10px; border-radius:6px; border:none; }
        button { background:#00a8cc; color:#fff; cursor:pointer; }
        .error { color:#f66; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Şifreyi Sıfırla</h3>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        {% if token %}
        <form method="post" autocomplete="off">
            <p>Kullanıcı: <strong>{{ username }}</strong></p>
            <input type="password" name="password" placeholder="Yeni şifre" required>
            <button type="submit">Şifreyi Değiştir</button>
        </form>
        {% else %}
            <p>Geçersiz veya süresi dolmuş token.</p>
            <p><a href="{{ url_for('forgot') }}" style="color:#00a8cc;">Tekrar dene</a></p>
        {% endif %}
    </div>
</body>
</html>
